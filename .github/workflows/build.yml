name: Ultra Slim Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Tools
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          ~/.cargo/bin/cargo-binstall tauri-cli@2.0.3 -y
          sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build
        run: |
          export NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          cd src-tauri
          rm -rf gen
          NDK_HOME=$NDK_HOME yes | ~/.cargo/bin/cargo-tauri android init
          
          # SUNTIK MANIFEST SECARA PAKSA (CARA PALING AMPUH)
          MANIFEST_FILE=$(find gen/android -name "AndroidManifest.xml")
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST_FILE
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST_FILE
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST_FILE
          
          # Optimasi Gradle
          find gen/android -name "build.gradle" -exec sed -i 's/minifyEnabled false/minifyEnabled true/g' {} +
          
          NDK_HOME=$NDK_HOME ~/.cargo/bin/cargo-tauri android build --target aarch64

      - name: Manual Compression & Sign
        run: |
          find src-tauri/gen/android -name "*.so" -exec upx --ultra-brute {} \;
          keytool -genkey -v -keystore release.keystore -alias vuzt -keyalg RSA -keysize 2048 -validity 10000 -storepass vuztpass -keypass vuztpass -dname "CN=Vuzt"
          APK_PATH=$(find src-tauri/gen/android -name "*-release-unsigned.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks release.keystore --ks-pass pass:vuztpass --out vuzt-final.apk $APK_PATH

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vuzt-v${{ github.run_number }}
          files: vuzt-final.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
