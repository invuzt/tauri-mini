name: Final Fix Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install System Deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev mold

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          ~/.cargo/bin/cargo-binstall tauri-cli@2.0.3 -y

      - name: Build Actual Release
        run: |
          # Cari path NDK asli di runner
          export NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          echo "Using NDK at $NDK_HOME"
          
          cd src-tauri
          rm -rf gen/android
          
          # Jalankan init dengan NDK_HOME yang valid
          NDK_HOME=$NDK_HOME yes | ~/.cargo/bin/cargo-tauri android init
          
          # Build
          NDK_HOME=$NDK_HOME ~/.cargo/bin/cargo-tauri android build --target aarch64
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tauri-final-fixed
          path: |
             src-tauri/gen/android/**/*.apk
