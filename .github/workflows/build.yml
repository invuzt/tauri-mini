name: Final Slim Release
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2

      - name: Install System Deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev mold

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.1.1

      - name: Build Actual Release
        run: |
          cd src-tauri
          yes | cargo tauri android init
          # Pakai release agar size kecil, tapi tambahkan signing manual nanti
          cargo tauri android build --target aarch64
          
      - name: Sign APK (Dummy Signer)
        run: |
          # Menggunakan debug key bawaan SDK untuk tanda tangani APK Release
          # Ini trik agar APK Release yang kecil bisa diinstal seperti APK Debug
          find src-tauri/gen/android -name "*-release-unsigned.apk" -exec mv {} src-tauri/final.apk \;
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks-pass pass:android --ks $ANDROID_HOME/build-tools/34.0.0/debug.keystore src-tauri/final.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tauri-super-slim
          path: src-tauri/final.apk
