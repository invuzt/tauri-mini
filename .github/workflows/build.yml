name: Build Final Ultra-Slim APK
on:
  push:
    branches: [ rust, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Rust
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Rust Target
        run: rustup target add aarch64-linux-android

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev mold upx-ucl

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          ~/.cargo/bin/cargo-binstall tauri-cli@2.0.3 -y

      - name: Build & Slimming
        run: |
          export NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          cd src-tauri
          # Init jika folder gen belum ada
          if [ ! -d "gen/android" ]; then
            NDK_HOME=$NDK_HOME yes | ~/.cargo/bin/cargo-tauri android init
          fi
          # Build Release
          NDK_HOME=$NDK_HOME ~/.cargo/bin/cargo-tauri android build --target aarch64
          
          # Kompres library internal di dalam folder build sebelum dipaketkan (opsional)
          find gen/android -name "*.so" -exec upx --best {} \;

      - name: Sign APK (Dummy Signature)
        run: |
          # Cari APK unsigned hasil build
          APK_PATH=$(find src-tauri/gen/android -name "*-release-unsigned.apk" | head -1)
          # Tanda tangani pakai debug keystore bawaan Android SDK
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks-pass pass:android --ks $ANDROID_HOME/build-tools/34.0.0/debug.keystore --out src-tauri/vuzt-ai-final.apk $APK_PATH

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vuzt-v${{ github.run_number }}
          name: Vuzt AI Build v${{ github.run_number }}
          files: src-tauri/vuzt-ai-final.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
