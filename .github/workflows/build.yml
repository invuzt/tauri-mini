name: Final Slim Release
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2

      - name: Install System Deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev mold

      - name: Install Tauri CLI
        run: |
          # Gunakan cara paling aman: download binary langsung
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          # Nama paket yang benar di registry adalah tauri-cli
          ~/.cargo/bin/cargo-binstall tauri-cli@2.0.3 -y

      - name: Build Actual Release
        run: |
          cd src-tauri
          yes | ~/.cargo/bin/cargo-tauri android init
          ~/.cargo/bin/cargo-tauri android build --target aarch64
          
      - name: Upload Unsigned APK (Untuk Cek Size)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-final-result
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
