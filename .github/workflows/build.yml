name: Final Fix Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install System Deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev mold

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          ~/.cargo/bin/cargo-binstall tauri-cli@2.0.3 -y

      - name: Build Actual Release
        env:
          # Paksa NDK Home agar init tidak komplain
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk-bundle
        run: |
          cd src-tauri
          rm -rf gen/android
          
          # Jalankan init
          yes | ~/.cargo/bin/cargo-tauri android init
          
          # Kadang generator menaruh project di folder yang dalam, kita paksa build mencari path-nya
          # Jika folder gen/android ada, kita hajar build
          ~/.cargo/bin/cargo-tauri android build --target aarch64
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tauri-final-fixed
          path: |
             src-tauri/gen/android/**/*.apk
             src-tauri/gen/android/app/build/outputs/apk/release/*.apk
