name: Android Slim Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Hanya target 64-bit untuk HP modern agar size APK kecil
          targets: aarch64-linux-android

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: System Deps & Mold
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev mold

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli -y

      - name: Build Slim APK
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold -C target-feature=+crt-static"
        run: |
          cd src-tauri
          if [ ! -d "gen/android" ]; then
            yes | cargo tauri android init
          fi
          
          # Build hanya untuk 1 arsitektur (Slim Mode) 
          # Menggunakan --debug agar ditandatangani dummy key secara otomatis
          cargo tauri android build --debug --target aarch64
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-slim-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
