name: Android Turbo Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Initialize and Build APK
        run: |
          # Karena kita tidak init di lokal, kita paksa init di sini
          # --accept-all-sdk-licenses memastikan tidak ada prompt interaktif
          cargo tauri android init --accept-all-sdk-licenses
          cargo tauri android build --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tauri-mini-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
