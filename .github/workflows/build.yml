name: Android Turbo Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      # Caching super agresif
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install System Deps & Mold
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev mold

      - name: Install Tauri CLI (Fast Install)
        run: |
          # Pakai binstall supaya tidak perlu compile 700+ crate di runner
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli@2.0.0 -y

      - name: Build APK Release
        env:
          # Pakai mold linker agar linking kilat
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: |
          # Automasi init dan build
          yes | cargo tauri android init
          cargo tauri android build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
