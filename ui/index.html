<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vuzt Proof of Rust</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #e0e0e0; font-family: sans-serif; }
        .log-box { 
            background: #000; color: #00ff00; padding: 10px; font-family: monospace; 
            font-size: 11px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #333;
        }
        input { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #444; background: #1e1e1e; color: white; }
        button { padding: 10px; border-radius: 5px; border: none; background: #007bff; color: white; }
        .item { background: #1e1e1e; padding: 10px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="rustInfo" class="log-box">Menunggu data dari Rust...</div>

    <div style="display:flex; gap:10px;">
        <input type="text" id="inputName" placeholder="Tambah data...">
        <button onclick="addItem()">ADD</button>
    </div>

    <div id="list"></div>

    <script>
        const { invoke } = window.__TAURI__.core;

        async function updateRustInfo() {
            // Meminta info spesifik dari sistem Rust
            const info = await invoke('get_rust_info');
            document.getElementById('rustInfo').innerText = "> " + info;
        }

        async function render(items) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            items.forEach(item => {
                listDiv.innerHTML += `
                    <div class="item">
                        <span>${item.name}</span>
                        <button style="background:#b00020" onclick="deleteItem(${item.id})">DEL</button>
                    </div>`;
            });
        }

        async function addItem() {
            const input = document.getElementById('inputName');
            const items = await invoke('create_item', { name: input.value });
            input.value = '';
            render(items);
        }

        async function deleteItem(id) {
            const items = await invoke('delete_item', { id });
            render(items);
        }

        window.onload = async () => {
            updateRustInfo();
            const items = await invoke('read_items');
            render(items);
        }
    </script>
</body>
</html>
