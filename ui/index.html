<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    # Meta tag di bawah ini adalah kunci anti-zoom dan lock scale
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vuzt AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow: hidden; /* Mencegah scroll yang tidak perlu */
            touch-action: pan-x pan-y; /* Hanya izinkan scroll biasa, bukan zoom */
            -webkit-user-select: none; /* Mencegah seleksi teks yang mengganggu */
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vuzt AI Ready</h1>
    </div>
</body>
</html>
