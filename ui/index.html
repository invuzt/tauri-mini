<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vuzt AI</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #eee; font-family: sans-serif; }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1e1e1e; color: white; outline: none; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        .item { background: #1e1e1e; padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ff00; }
        .del-btn { background: #b00020; padding: 8px; border-radius: 5px; font-size: 12px; border: none; color: white; }
    </style>
</head>
<body>
    <h3>Vuzt AI Local File</h3>
    <p style="font-size: 10px; color: #888;">File: /Download/vuzt_data.md</p>
    <div class="input-group">
        <input type="text" id="inputName" placeholder="Tulis catatan...">
        <button onclick="addItem()">SIMPAN</button>
    </div>
    <div id="list"></div>

    <script>
        const { invoke } = window.__TAURI__.core;
        async function render(items) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            items.forEach(item => {
                listDiv.innerHTML += `
                    <div class="item">
                        <span>${item.name}</span>
                        <button class="del-btn" onclick="deleteItem(${item.id})">HAPUS</button>
                    </div>`;
            });
        }
        async function addItem() {
            const input = document.getElementById('inputName');
            if (!input.value) return;
            const items = await invoke('create_item', { name: input.value });
            input.value = '';
            render(items);
        }
        async function deleteItem(id) {
            const items = await invoke('delete_item', { id });
            render(items);
        }
        window.onload = async () => {
            const items = await invoke('read_items');
            render(items);
        }
    </script>
</body>
</html>
