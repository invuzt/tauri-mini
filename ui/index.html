<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vuzt Camera</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #eee; font-family: sans-serif; text-align: center; }
        #video-preview { width: 100%; max-width: 400px; border-radius: 15px; background: #000; border: 2px solid #007bff; transform: scaleX(-1); }
        .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        .stop-btn { background: #b00020; }
    </style>
</head>
<body>
    <h3>Vuzt Camera Preview</h3>
    <video id="video-preview" autoplay playsinline></video>
    
    <div class="controls">
        <button onclick="startCamera()">Buka Kamera</button>
        <button class="stop-btn" onclick="stopCamera()">Tutup</button>
    </div>

    <script>
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // "user" untuk depan, "environment" untuk belakang
                    audio: false 
                });
                const video = document.getElementById('video-preview');
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal akses kamera: " + err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('video-preview').srcObject = null;
            }
        }
    </script>
</body>
</html>
